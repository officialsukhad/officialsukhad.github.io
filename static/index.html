<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Static File</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      margin: 0;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    a {
      display: block;
      font-size: 1.1rem;
      color: #4fc3f7;
      margin: 0.4rem 0;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #81d4fa;
    }

    .file-container {
      margin-top: 1.5rem;
      background-color: #1e1e1e;
      padding: 1.5rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <h1>Files in <strong>/static</strong> — Static File</h1>
  <div class="file-container">
    <a href="mukbang.mp4">mukbang.mp4</a>
    <a href="kulosa.mp4">kulosa.mp4</a>
    <a href="dance.mp4">dance.mp4</a>
    <a href="edits.mp4">edits.mp4</a>
    <a href="video.mp4">video.mp4</a>

</body>
</html>
