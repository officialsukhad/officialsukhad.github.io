<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sukhad's Video Player</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background-color: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    header {
      background-color: #1f1f1f;
      padding: 1rem 2rem;
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    .container {
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    .main-video {
      width: 100%;
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .main-video video {
      width: 100%;
      height: 500px;
      object-fit: contain;
      background-color: black;
    }
    .video-list {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      overflow-x: auto;
      padding: 0.5rem 0;
    }
    .video-item {
      flex: 0 0 300px;
      background: #1c1c1c;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .video-item:hover {
      transform: scale(1.05);
    }
    .video-item video {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-bottom: 1px solid #333;
    }
    .video-title {
      padding: 0.5rem;
      font-size: 1rem;
      text-align: center;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .container {
        flex-direction: row;
      }
      .main-video {
        flex: 3;
        margin-bottom: 0;
        margin-right: 1rem;
      }
      .video-list {
        flex: 1;
        flex-direction: column;
        overflow-y: auto;
        max-height: 500px;
      }
      .video-item {
        flex: none;
      }
    }
  </style>
</head>
<body>
  <header>🎥 Sukhad's Video Gallery</header>
  <div class="container">
    <div class="main-video" id="mainVideoContainer">
      <video id="mainVideo" src="mukbang.mp4" controls autoplay></video>
    </div>
    <div class="video-list">
      <div class="video-item" onclick="playVideo('mukbang.mp4', 'Mukbang')">
        <video src="mukbang.mp4" muted></video>
        <div class="video-title">Mukbang</div>
      </div>
      <div class="video-item" onclick="playVideo('kulosa.mp4', 'Kulosa')">
        <video src="kulosa.mp4" muted></video>
        <div class="video-title">Kulosa</div>
      </div>
      <!-- Add more videos here -->
    </div>
  </div>

  <script>
    function playVideo(src, title) {
      const video = document.getElementById('mainVideo');
      video.src = src;
      video.play();
    }
  </script>
</body>
</html>
