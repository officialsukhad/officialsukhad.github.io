<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files in /static</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
    }
    h1 {
      color: #333;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
    li {
      margin: 10px 0;
    }
    a {
      text-decoration: none;
      color: #007acc;
    }
    a:hover {
      text-decoration: underline;
    }
    .unavailable {
      color: #f00; /* Red color for unavailable files */
    }
  </style>
</head>
<body>
  <h1>Files in /static</h1>
  <ul id="file-list"></ul>

  <script>
    // Function to check if a file exists
    function fileExists(url) {
      return fetch(url, { method: 'HEAD' })
        .then(response => response.ok)
        .catch(() => false); // Return false if fetch fails
    }

    // Fetch the files list from the JSON
    fetch('static/files.json')  // Assuming your JSON file is stored at /static/files.json
      .then(response => response.json())
      .then(data => {
        const fileList = document.getElementById('file-list');
        data.files.forEach(async (file) => {
          const fileUrl = `static/${file}`;
          const exists = await fileExists(fileUrl);

          const listItem = document.createElement('li');
          const fileLink = document.createElement('a');
          fileLink.href = exists ? fileUrl : '#';
          fileLink.textContent = exists ? file : `${file} (File not available)`;

          if (!exists) {
            fileLink.classList.add('unavailable');
          }

          listItem.appendChild(fileLink);
          fileList.appendChild(listItem);
        });
      })
      .catch(error => {
        console.error('Error loading the files:', error);
      });
  </script>
</body>
</html>
